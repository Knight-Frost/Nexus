<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons / app icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="theme-color" content="#0e1113" />

    <!-- Set the theme BEFORE first paint to avoid a flash of the wrong theme.
         Mirrors the resolver in src/context/theme.ts (kept tiny + dependency-free
         so it can run inline). The React ThemeProvider then takes over. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('nexus.theme');
          var resolved =
            c === 'light' || c === 'dark'
              ? c
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', resolved === 'light' ? '#faf8f3' : '#0e1113');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta
      name="description"
      content="Nexus is a secure property-rental platform for tenants, landlords, and administrators."
    />
    <meta property="og:title" content="Nexus | Secure Property Rentals" />
    <meta property="og:description" content="Find, manage, and grow property rentals in one secure platform." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/android-chrome-512x512.png" />
    <title>Nexus | Secure Property Rentals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesque:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
